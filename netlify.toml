[build]
  base    = "VaultGuard-Portal-main"
  command = "pnpm install && pnpm --filter @workspace/vaultguard build"
  publish = "artifacts/vaultguard/dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"
  PORT         = "3000"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
